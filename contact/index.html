<!DOCTYPE html>
<html lang="ko" id="root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>문의 — Project Sarang</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#C8102E;--black:#111;--white:#fff;--gray:#777;--mid:#444;--off:#F4F2EF;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--white);color:var(--black);-webkit-font-smoothing:antialiased;}

/* NAV — index.html과 동일 구조 */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;
  padding:20px 48px;
  background:rgba(255,255,255,0.97);
  border-bottom:1px solid #eee;
}
.nav-logo{font-weight:900;font-size:15px;color:var(--red);text-decoration:none;flex-shrink:0;}
.nav-links{display:flex;gap:28px;list-style:none;flex:1;justify-content:center;}
.nav-links a{font-weight:700;font-size:12px;color:var(--gray);text-decoration:none;letter-spacing:0.05em;}
.nav-links a:hover,.nav-links a.active{color:var(--red);}
.nav-right{display:flex;align-items:center;gap:0;flex-shrink:0;}

/* LANG TOGGLE */
.lang-toggle{
  display:flex;align-items:center;gap:0;
  margin-left:0;
  border:1.5px solid #ddd;
  border-radius:4px;
  overflow:hidden;
  flex-shrink:0;
}
.lang-btn{
  font-weight:700;font-size:11px;
  letter-spacing:0.1em;
  padding:5px 10px;
  background:transparent;
  border:none;cursor:pointer;
  color:var(--gray);
  transition:all 0.15s;
}
.lang-btn.active{background:var(--red);color:var(--white);}
.lang-btn:hover:not(.active){color:var(--red);}

/* 햄버거 */
.hamburger{
  display:none;
  flex-direction:column;justify-content:center;align-items:center;
  width:36px;height:36px;gap:5px;
  background:none;border:none;cursor:pointer;padding:4px;
  margin-left:12px;flex-shrink:0;
}
.hamburger span{
  display:block;width:22px;height:2px;
  background:var(--black);border-radius:2px;
  transition:all 0.3s;
}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.hamburger.open span:nth-child(2){opacity:0;}
.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}

/* 모바일 오버레이 메뉴 */
.nav-overlay{
  display:none;
  position:fixed;inset:0;z-index:99;
  background:rgba(255,255,255,0.98);
  flex-direction:column;align-items:center;justify-content:center;
  gap:40px;
}
.nav-overlay.open{display:flex;}
.nav-overlay a{
  font-weight:900;font-size:28px;letter-spacing:-0.01em;
  color:var(--black);text-decoration:none;
  transition:color 0.15s;
}
.nav-overlay a:hover,.nav-overlay a.active{color:var(--red);}
.nav-overlay .overlay-lang{
  display:flex;gap:0;
  border:1.5px solid #ddd;border-radius:4px;overflow:hidden;
  margin-top:8px;
}
.nav-overlay .overlay-lang .lang-btn{font-size:13px;padding:8px 18px;}

@media(max-width:768px){
  nav{padding:16px 24px;}
  .nav-links{gap:20px;}
}
@media(max-width:560px){
  nav{
    padding:14px 20px;
    display:grid;
    grid-template-columns:1fr auto;
    background:rgba(255,255,255,0.97);
    border-bottom:1px solid #eee;
    position:fixed;
    z-index:100;
  }
  .nav-logo{color:var(--red);}
  .nav-links{display:none;}
  .nav-right{margin-left:0;}
  .hamburger{display:flex;}
}

/* ─── 문의 페이지 고유 스타일 ─── */
.wrap{
  min-height:100vh;
  padding-top:72px;
  display:grid;
  grid-template-columns:1fr 1fr;
}
.left{
  background:var(--red);
  padding:80px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  position:relative;
  overflow:hidden;
}
.left-content{position:relative;z-index:2;}
.left-title{font-weight:900;font-size:clamp(32px,5vw,60px);line-height:1.1;letter-spacing:-0.02em;color:var(--white);margin-bottom:16px;}
.right{
  background:var(--white);
  padding:80px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}
.right-tag{font-weight:700;font-size:11px;letter-spacing:0.2em;color:var(--red);text-transform:uppercase;margin-bottom:40px;}
.pm-label{font-weight:700;font-size:11px;letter-spacing:0.15em;color:var(--gray);text-transform:uppercase;margin-bottom:8px;}
.pm-name{font-weight:900;font-size:clamp(28px,4vw,48px);letter-spacing:-0.02em;color:var(--black);margin-bottom:32px;}
.email-link{
  display:inline-block;font-weight:700;
  font-size:clamp(14px,1.6vw,18px);
  color:var(--black);text-decoration:none;
  border-bottom:2px solid var(--red);
  padding-bottom:4px;margin-bottom:56px;
  transition:color 0.2s;
}
.email-link:hover{color:var(--red);}
.divider{width:48px;height:2px;background:#e8e8e8;margin-bottom:36px;}
.note{font-size:14px;font-weight:400;line-height:2.2;color:var(--gray);max-width:300px;}
.note strong{font-weight:700;color:var(--black);}
.back{margin-top:48px;}
.btn-outline{display:inline-block;font-weight:700;font-size:13px;letter-spacing:0.05em;text-decoration:none;padding:14px 32px;border:2px solid var(--black);color:var(--black);transition:all 0.2s;}
.btn-outline:hover{background:var(--black);color:var(--white);}
.watermark{
  position:fixed;bottom:-40px;right:-10px;
  font-weight:900;font-size:clamp(200px,30vw,360px);
  color:var(--red);opacity:0.06;
  pointer-events:none;line-height:1;z-index:0;
  font-family:'Noto Sans KR',sans-serif;
}
@media(max-width:900px){
  .wrap{grid-template-columns:1fr;}
  .left{min-height:40vh;padding:56px 32px;}
  .right{padding:56px 32px;}
}
@media(max-width:560px){
  .left{padding:48px 20px;min-height:35vh;}
  .right{padding:48px 20px;}
  .left-title{font-size:clamp(28px,7vw,48px);}
  .pm-name{font-size:clamp(24px,6vw,40px);}
  .email-link{font-size:14px;}
  .btn-outline{padding:12px 24px;font-size:12px;}
}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">PROJECT SARANG</a>
  <ul class="nav-links">
    <li><a href="/project" data-ko="프로젝트" data-en="Project">프로젝트</a></li>
    <li><a href="/artist" data-ko="작가" data-en="Artist">작가</a></li>
    <li><a href="/contact" class="active" data-ko="문의" data-en="Contact">문의</a></li>
  </ul>
  <div class="nav-right">
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('ko')">KO</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
    <button class="hamburger" id="hamburger" aria-label="메뉴" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<!-- 모바일 오버레이 메뉴 -->
<div class="nav-overlay" id="navOverlay">
  <a href="/project" data-ko="프로젝트" data-en="Project" onclick="toggleMenu()">프로젝트</a>
  <a href="/artist" data-ko="작가" data-en="Artist" onclick="toggleMenu()">작가</a>
  <a href="/contact" class="active" data-ko="문의" data-en="Contact" onclick="toggleMenu()">문의</a>
  <div class="overlay-lang">
    <button class="lang-btn active" onclick="setLang('ko')">KO</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
  </div>
</div>

<div class="wrap">
  <div class="left">
    <div class="left-content">
      <h1 class="left-title" data-ko="〈사랑〉을 당신의 곁으로" data-en="Bring 〈Sarang〉 to You">〈사랑〉을 당신의 곁으로</h1>
    </div>
  </div>

  <div class="right">
    <p class="right-tag">Project Manager</p>
    <p class="pm-label" data-ko="담당자" data-en="Contact">담당자</p>
    <p class="pm-name">레프 (Lef Kim)</p>
    <a class="email-link" href="mailto:lefkimco@gmail.com">lefkimco@gmail.com</a>
    <div class="divider"></div>
    <p class="note" data-ko="기업·지자체 설치 문의<br>모든 제안을 환영합니다." data-en="Inquiries for corporate &amp; public installation.<br>All proposals are welcome.">
      기업·지자체 설치 문의<br>
      모든 제안을 환영합니다.
    </p>
    <div class="back">
      <a href="/project" class="btn-outline" data-ko="← 프로젝트 보기" data-en="← View Project">← 프로젝트 보기</a>
    </div>
  </div>
</div>

<span class="watermark">ㅅ</span>

<script>
function toggleMenu(){
  document.getElementById('hamburger').classList.toggle('open');
  document.getElementById('navOverlay').classList.toggle('open');
}
function setLang(lang) {
  document.getElementById('root').lang = lang;
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.toLowerCase() === lang);
  });
  document.querySelectorAll('[data-ko][data-en]').forEach(el => {
    const val = el.getAttribute('data-' + lang);
    if (val !== null) el.innerHTML = val;
  });
  try { localStorage.setItem('sarang-lang', lang); } catch(e) {}
}
(function(){
  let saved;
  try { saved = localStorage.getItem('sarang-lang'); } catch(e) {}
  if (saved && saved !== 'ko') setLang(saved);
})();
</script>
</body>
</html>
